name: WiseVPN Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Lancement manuel depuis GitHub Actions UI
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options: [ debug, release ]

# ─────────────────────────────────────────────────────────────
#  Variables globales
# ─────────────────────────────────────────────────────────────
env:
  JAVA_VERSION: '17'
  GRADLE_OPTS: '-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx2g'

jobs:

  # ═══════════════════════════════════════════════════════════
  #  JOB 1 : Build Debug APK
  # ═══════════════════════════════════════════════════════════
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    if: github.event.inputs.build_type != 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WiseVPN-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: APK info
        run: |
          echo "── APK généré ──"
          ls -lh app/build/outputs/apk/debug/
          echo "SHA256: $(sha256sum app/build/outputs/apk/debug/app-debug.apk)"

  # ═══════════════════════════════════════════════════════════
  #  JOB 2 : Build Release APK (signé)
  # ═══════════════════════════════════════════════════════════
  build-release:
    name: Build Release APK (signé)
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' ||
      github.event.inputs.build_type == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # ── Décoder le keystore depuis secret GitHub ────────────
      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "⚠ KEYSTORE_BASE64 non configuré — build release non signé"
            echo "SKIP_SIGNING=true" >> $GITHUB_ENV
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > app/wisevpn-release.jks
            echo "SKIP_SIGNING=false" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        env:
          SKIP_SIGNING: ${{ env.SKIP_SIGNING }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS:          ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:       ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ "$SKIP_SIGNING" = "true" ]; then
            echo "Build release non signé (keystore absent)"
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file="" \
              --stacktrace
          else
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=$PWD/app/wisevpn-release.jks \
              -Pandroid.injected.signing.store.password="$KEY_STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD" \
              --stacktrace
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WiseVPN-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: APK info
        run: |
          echo "── APK release ──"
          ls -lh app/build/outputs/apk/release/
          find app/build/outputs/apk/release/ -name "*.apk" \
            -exec sha256sum {} \;

  # ═══════════════════════════════════════════════════════════
  #  JOB 3 : Release GitHub automatique (tag v*)
  # ═══════════════════════════════════════════════════════════
  github-release:
    name: Créer Release GitHub
    runs-on: ubuntu-latest
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Télécharger APK release
        uses: actions/download-artifact@v4
        with:
          name: WiseVPN-release-${{ github.run_number }}
          path: release/

      - name: Créer Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.apk
          name: "WiseVPN ${{ github.ref_name }}"
          body: |
            ## WiseVPN ${{ github.ref_name }}

            ### Téléchargement
            - `app-release.apk` — APK signé pour distribution directe

            ### Changelog
            Voir les commits depuis la version précédente.

            ### Installation
            1. Télécharger `app-release.apk`
            2. Activer "Sources inconnues" sur Android
            3. Installer l'APK
          draft: false
          prerelease: false
