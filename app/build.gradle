plugins {
    id 'com.android.application'
}

android {
    namespace 'com.wdesign.wisevpn'
    compileSdk 34

    defaultConfig {
        applicationId "com.wdesign.wisevpn"
        minSdk 26
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    implementation 'androidx.core:core:1.12.0'
    implementation 'com.google.android.material:material:1.11.0'

    // OkHttp pour PlayerEngine (si intégré dans même projet)
    implementation 'com.squareup.okhttp3:okhttp:4.12.0'

    // ics-openvpn : pas de dépendance Gradle — contrôle via Intent/AIDL
    // L'app ics-openvpn doit être installée sur l'appareil (Play/F-Droid)
    // WiseVpnService utilise VpnService natif Android (aucune dépendance)
}
